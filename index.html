<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Sketch AI</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header class="topbar">
        <div class="brand">
          <a
            class="github-brand-link"
            href="https://github.com/brg2/3DSketchAI"
            target="_blank"
            rel="noopener noreferrer"
            title="View Source on GitHub"
            aria-label="View Source on GitHub"
          >
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                <path
                  d="M12 .8a11.2 11.2 0 0 0-3.54 21.82c.56.1.76-.24.76-.54v-2.06c-3.1.68-3.76-1.32-3.76-1.32-.5-1.28-1.24-1.62-1.24-1.62-1.02-.7.08-.68.08-.68 1.12.08 1.72 1.16 1.72 1.16 1 .1 2.64.12 3.2.88.1-.72.38-1.2.7-1.48-2.48-.28-5.08-1.24-5.08-5.52 0-1.22.44-2.22 1.16-3-.12-.28-.5-1.42.1-2.96 0 0 .94-.3 3.08 1.14A10.6 10.6 0 0 1 12 6.24c.96 0 1.9.13 2.8.38 2.14-1.44 3.08-1.14 3.08-1.14.6 1.54.22 2.68.1 2.96.72.78 1.16 1.78 1.16 3 0 4.3-2.6 5.24-5.08 5.52.4.34.76 1.02.76 2.06v3.06c0 .3.2.64.78.54A11.2 11.2 0 0 0 12 .8z"
                />
              </svg>
            </span>
          </a>
          <h1>3D Sketch AI</h1>
          <span id="doc-name" class="doc-name" contenteditable="true" role="textbox" aria-label="Model Name" spellcheck="false">Untitled</span>
        </div>
        <div class="actions">
          <button
            id="model-open"
            class="icon-btn"
            type="button"
            aria-label="Open Model Script"
            title="Open Model Script"
          >
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h6l2 2h8v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" />
                <path d="M12 17v-7" />
                <path d="M8.5 13.5L12 10l3.5 3.5" />
              </svg>
            </span>
            <span class="btn-label">Open</span>
          </button>
          <input id="model-open-input" type="file" accept=".ts,text/typescript,text/plain" hidden />
          <button
            id="model-save"
            class="icon-btn"
            type="button"
            aria-label="Save Model Script"
            title="Save Model Script"
          >
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 4h12l2 2v14H5z" />
                <path d="M8 4v6h8V4" />
                <path d="M8 16h8" />
              </svg>
            </span>
            <span class="btn-label">Save</span>
          </button>
          <div class="export-menu-wrap">
            <button
              id="export-toggle"
              class="icon-btn export-toggle"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-label="Export Model"
              title="Export Model"
            >
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3v12" />
                  <path d="M7 8l5-5 5 5" />
                  <path d="M5 15v4h14v-4" />
                </svg>
              </span>
              <span class="btn-label">Export</span>
            </button>
            <div id="export-menu" class="export-menu" role="menu" hidden>
              <button type="button" data-export-format="glb" role="menuitem">GLB (.glb)</button>
              <button type="button" data-export-format="obj" role="menuitem">OBJ (.obj)</button>
              <button type="button" data-export-format="stl" role="menuitem">STL (.stl)</button>
            </div>
          </div>
          <button data-action="undo">Undo</button>
          <button data-action="redo">Redo</button>
          <button data-action="reset">New</button>
          <button
            id="code-toggle"
            class="icon-btn code-toggle"
            type="button"
            aria-expanded="true"
            aria-label="Hide Side Panel"
            title="Hide Side Panel"
          >
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
                <path d="M4 7h16" />
                <path d="M4 12h16" />
                <path d="M4 17h16" />
              </svg>
            </span>
            <span class="btn-label">Hide Side Panel</span>
          </button>
        </div>
      </header>

      <aside class="sidebar">
        <button class="sidebar-scroll-control sidebar-scroll-up" type="button" data-sidebar-scroll="-1" aria-label="Scroll toolbar up"></button>
        <div class="sidebar-scroll-content">
          <h2>Tools</h2>
          <div class="tool-grid" id="tool-grid"></div>

          <h2>Selection</h2>
          <div class="selection-grid">
            <button data-selection-mode="object">Object</button>
            <button data-selection-mode="face">Face</button>
            <button data-selection-mode="edge">Edge</button>
          </div>

          <h2>Scene</h2>
          <div class="scene-ops">
            <button data-action="primitive">Primitive</button>
            <button data-action="zoomExtents">Zoom Extents</button>
            <button data-action="group">Group</button>
            <button data-action="component">Component</button>
          </div>
        </div>
        <button class="sidebar-scroll-control sidebar-scroll-down" type="button" data-sidebar-scroll="1" aria-label="Scroll toolbar down"></button>
      </aside>

      <main class="viewport-wrap">
        <canvas id="viewport"></canvas>
        <div id="overlay"></div>
      </main>

      <section class="code-panel" id="code-panel">
        <div class="panel-tabs" role="tablist" aria-label="Panel Sections">
          <button class="panel-tab active" id="panel-tab-script" data-panel-page="script" type="button" role="tab" aria-selected="true">
            Script
          </button>
          <button class="panel-tab" id="panel-tab-settings" data-panel-page="settings" type="button" role="tab" aria-selected="false">
            Settings
          </button>
        </div>
        <div class="panel-page active" data-panel-page-content="script">
          <div class="code-header">
            <h2>Model Script</h2>
            <div class="code-actions">
              <button
                id="code-compress"
                class="code-tool-btn"
                type="button"
                title="Compress Model Script"
                aria-label="Compress Model Script"
              ></button>
              <button
                id="code-copy"
                class="code-tool-btn"
                type="button"
                title="Copy Model Script"
                aria-label="Copy Model Script"
              ></button>
            </div>
          </div>
          <pre id="code-view"></pre>
        </div>
        <div class="panel-page" data-panel-page-content="settings">
          <h2>Settings</h2>
          <div class="settings-list">
            <button id="grid-toggle" class="settings-btn" type="button" aria-pressed="false">Ground Grid: Off</button>
            <button id="dev-console-toggle" class="settings-btn" type="button" aria-pressed="false">Dev Console: Off</button>
            <label class="settings-field" for="ground-theme">
              <span>Ground Theme</span>
              <select id="ground-theme">
                <option value="none">None</option>
                <option value="grass">Grass</option>
                <option value="water">Water</option>
                <option value="dirt-rocks">Dirt / Rocks</option>
                <option value="forest" selected>Forest</option>
                <option value="city">City</option>
              </select>
            </label>
            <label class="settings-field" for="terrain-variation">
              <span>Terrain Variation</span>
              <input id="terrain-variation" type="range" min="0" max="1" step="0.01" value="1" />
              <output id="terrain-variation-value" for="terrain-variation">100%</output>
            </label>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
